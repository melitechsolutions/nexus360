services:
  # 1. Database Service (MySQL 8.0)
  db:
    image: mysql:8.0
    container_name: melitech_crm_db
    restart: always
    environment:
      # --- Database Credentials ---
      MYSQL_ROOT_PASSWORD: "R:vVl:m7J9x3Hr|yWEUp"
      MYSQL_DATABASE: melitech_crm
      MYSQL_USER: melitech_user
      MYSQL_PASSWORD: "tjwzT9pW;NGYq1QxSq0B"
      # Ensure compatibility and allow network users
      MYSQL_INITDB_SKIP_TZINFO: 1
    # MySQL startup flags for network connectivity
    command: --skip-name-resolve --default-authentication-plugin=mysql_native_password --bind-address=0.0.0.0
    ports:
      - "3307:3306"
    volumes:
      - melitech_crm_data:/var/lib/mysql
      - ./init-mysql.sql:/docker-entrypoint-initdb.d/02-init-permissions.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - melitech-network

  # 2. Application Service (Backend + Frontend)
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ID: melitech_crm
        VITE_APP_TITLE: "Nexus360"
        VITE_APP_LOGO: ""
    container_name: melitech_crm_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      # Node Environment
      NODE_ENV: production
      
      # Database Connection String
      DATABASE_URL: mysql://melitech_user:tjwzT9pW;NGYq1QxSq0B@db:3306/melitech_crm
      
      # Security
      JWT_SECRET: w1IHeWVTQvm2DNaSTLJD8HFdpfeN3iYk_ZQMXjNmsvo
      
      # Application Configuration
      VITE_APP_ID: melitech_crm
      VITE_APP_TITLE: "Nexus360"
      VITE_APP_LOGO: ""
      
      # Owner Information
      OWNER_EMAIL: nexus360@gmail.com
      OWNER_NAME: Nexus360 Admin
      OWNER_OPEN_ID: admin
      
      # Cookie Configuration for Docker HTTP environment
      COOKIE_SAME_SITE: "lax"
      COOKIE_SECURE: "false"
      
      # Email Configuration (SMTP)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-${SMTP_PASS:-}}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-}
      
      # Groq Integration (AI Hub - Free Tier Available)
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-70b-versatile}
      
    depends_on:
      db:
        condition: service_healthy
    networks:
      - melitech-network
# Define named networks for inter-container communication
networks:
  melitech-network:
    driver: bridge

# Define named volumes for persistent data
volumes:
  melitech_crm_data:
    driver: local