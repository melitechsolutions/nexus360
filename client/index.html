<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1"
    />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <title>%VITE_APP_TITLE%</title>
    <style>
      body { margin: 0; padding: 0; font-family: system-ui, sans-serif; }
      #root { min-height: 100vh; }
      #loading { 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        min-height: 100vh;
        background: #f5f5f5;
        font-size: 16px;
      }
      .error { color: red; }
    </style>
  </head>

  <body>
    <div id="root">
      <div id="loading">Loading application...</div>
    </div>
    <noscript>
      <div style="padding: 20px; color: red; font-size: 16px;">
        This application requires JavaScript to be enabled.
      </div>
    </noscript>
    <!-- ensure Download icon exists globally in case of chunk mishap -->
    <script>
      /*
        Provide a harmless default React component immediately. Some
        chunks occasionally reference `Download` as a free variable; if
        it were `null` React throws error #130. A functional component
        that returns null is acceptable—we're just avoiding a crash.
      */
      var Download = function(props){ return null; };
      window.Download = Download;
      // also provide a harmless label component globally to prevent
      // runtime ReferenceError when a module forgets to import it
      var Label = function(props){ return React ? React.createElement('label', props) : null; };
      window.Label = Label;
      /*
        The dynamic import is now optional and purely opportunistic; the
        app will continue to operate correctly if the fetch fails. The
        previous unversioned path caused a 404, so we intentionally omit
        it to eliminate redundant network requests.
      */
      (function(){
        try {
          // attempt to load the real icon so future chunks can update it
          import('https://cdn.jsdelivr.net/npm/lucide-react@0.453.0/dist/esm/lucide-react.js')
            .then(mod => {
              if (mod.Download) {
                Download = mod.Download;
                window.Download = mod.Download;
              }
            })
            .catch(() => {
              // ignore; our no-op component is already set
            });
        } catch (e) {
          // ignore syntax errors or CSP restrictions
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function(){
        var endpoint = "%VITE_ANALYTICS_ENDPOINT%";
        var websiteId = "%VITE_ANALYTICS_WEBSITE_ID%";
        // Only inject analytics script if endpoint is provided and not the raw placeholder
        if (endpoint && !endpoint.includes('%')) {
          try {
            var s = document.createElement('script');
            s.async = true; s.defer = true;
            s.src = 'https://' + endpoint.replace(/\/+$/,'') + '/umami';
            if (websiteId && !websiteId.includes('%')) s.setAttribute('data-website-id', websiteId);
            document.head.appendChild(s);
          } catch (e) {
            // swallow errors to avoid breaking the app
            console.warn('Umami injection failed', e);
          }
        }
      })();
    </script>
  </body>
</html>
